<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 4: Thermal Energy Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --walmart-blue: #0053e2;
            --off-white: #f8f9fa;
            --pure-white: #ffffff;
            --text-main: #202124;
            --success-green: #2e7d32;
            --error-red: #d32f2f;
        }

        body {
            font-family: 'Everyday Sans', 'Atkinson Hyperlegible Next', 'Atkinson Hyperlegible Mono', 'Arial', sans-serif;
            background-color: var(--off-white);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #quiz-container {
            width: 90%;
            max-width: 800px;
            background: var(--pure-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.25);
            position: relative;
            transition: all 0.3s ease;
        }

        .slide {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .slide.active {
            display: block;
        }

        h2 {
            color: var(--walmart-blue);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-left: 5px solid var(--walmart-blue);
            padding-left: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: var(--pure-white);
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            border-color: var(--walmart-blue);
            background-color: #f0f7ff;
            transform: translateX(5px);
        }

        .option-btn i {
            margin-right: 15px;
            color: var(--walmart-blue);
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .feedback.correct {
            background-color: #e8f5e9;
            border: 1px solid var(--success-green);
            color: var(--success-green);
        }

        .feedback.wrong {
            background-color: #ffebee;
            border: 1px solid var(--error-red);
            color: var(--error-red);
        }

        .next-btn {
            margin-top: 20px;
            background-color: var(--walmart-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            float: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background-color: var(--walmart-blue);
            transition: width 0.3s ease;
            border-radius: 12px 12px 0 0;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="progress-bar" id="progress"></div>
    <div id="quiz-content">
        </div>
</div>

<script>
    const quizData = [
        {
            question: "A large pot of soup and a small bowl of soup are both at 90°C. Which statement is true?",
            options: [
                "They have the same thermal energy.",
                "The pot has more thermal energy because it has more particles.",
                "The bowl has more thermal energy because it is smaller.",
                "They have different temperatures."
            ],
            correct: 1,
            explanation: "Temperature is the *average* kinetic energy, but Thermal Energy is the *total*. Since the pot has more matter (more particles), its total energy is higher."
        },
        {
            question: "Which method of heat transfer occurs when you touch a hot metal spoon?",
            options: [
                "Radiation",
                "Convection",
                "Conduction",
                "Absolute Zero"
            ],
            correct: 2,
            explanation: "Conduction is heat transfer through direct contact (touching). Metals are excellent conductors."
        },
        {
            question: "In what direction does thermal energy always move?",
            options: [
                "From colder objects to hotter objects.",
                "From objects with more mass to less mass.",
                "From hotter objects to colder objects.",
                "It moves randomly in all directions."
            ],
            correct: 2,
            explanation: "Thermal energy naturally flows from higher temperature (hotter) to lower temperature (colder) until equilibrium is reached."
        },
        {
            question: "Why does a puffy winter jacket keep you warm?",
            options: [
                "It is a good conductor.",
                "It is a good insulator that slows down energy transfer.",
                "It creates its own thermal energy.",
                "It uses radiation to heat your body."
            ],
            correct: 1,
            explanation: "Insulators like the air trapped in a jacket do not transfer heat easily, keeping your body heat from escaping."
        }
    ];

    let currentQuestion = 0;

    function loadQuestion() {
        const quizContent = document.getElementById('quiz-content');
        const q = quizData[currentQuestion];
        const progress = document.getElementById('progress');
        progress.style.width = `${((currentQuestion) / quizData.length) * 100}%`;

        quizContent.innerHTML = `
            <div class="slide active">
                <h2><i class="fas fa-microchip"></i> Question ${currentQuestion + 1}</h2>
                <p style="font-size: 1.2rem; margin-bottom: 20px;">${q.question}</p>
                <div class="options-container">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(${i})">
                            <i class="far fa-circle"></i> ${opt}
                        </button>
                    `).join('')}
                </div>
                <div id="feedback-box" class="feedback"></div>
                <button id="next-btn" class="next-btn" style="display:none;" onclick="nextStep()">Next Question <i class="fas fa-arrow-right"></i></button>
            </div>
        `;
    }

    window.checkAnswer = function(index) {
        const q = quizData[currentQuestion];
        const feedbackBox = document.getElementById('feedback-box');
        const nextBtn = document.getElementById('next-btn');
        const buttons = document.querySelectorAll('.option-btn');

        buttons.forEach(btn => btn.disabled = true);

        if (index === q.correct) {
            feedbackBox.innerHTML = `<strong><i class="fas fa-check-circle"></i> Correct!</strong><br>${q.explanation}`;
            feedbackBox.className = "feedback correct";
        } else {
            feedbackBox.innerHTML = `<strong><i class="fas fa-times-circle"></i> Not quite.</strong><br>The correct answer was: <em>${q.options[q.correct]}</em>. ${q.explanation}`;
            feedbackBox.className = "feedback wrong";
        }

        feedbackBox.style.display = "block";
        nextBtn.style.display = "block";
    };

    window.nextStep = function() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('progress').style.width = "100%";
            document.getElementById('quiz-content').innerHTML = `
                <div class="slide active" style="text-align:center;">
                    <h2><i class="fas fa-graduation-cap"></i> Quiz Complete!</h2>
                    <p>Excellent work, DRK. You have reviewed the core concepts of Unit 4.</p>
                    <button class="next-btn" style="float:none;" onclick="location.reload()">Restart Quiz</button>
                </div>
            `;
        }
    };

    loadQuestion();
</script>

</body>
</html>
